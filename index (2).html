<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語チャンク暗記カード</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#101116;
    --desk:#1b1d25;
    --desk-2:#22242e;
    --paper:#f0ead9;
    --ink-muted:#8d8fa0;
    --amber:#f2a541;
    --amber-dim:#c9822c;
    --teal:#63c9bd;
    --rose:#e0918e;
    --lav:#a79ce0;
    --danger:#e2694f;
    --ring:#33353f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(242,165,65,0.10), transparent 60%),
      var(--void);
    color:var(--paper);
    font-family:'Zen Maru Gothic', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 48px;
  }
  .en{font-family:'Space Grotesk', sans-serif;}

  /* ---------- header ---------- */
  .top{
    width:100%;
    max-width:460px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:6px;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:.12em;
    color:var(--ink-muted);
    font-family:'Space Grotesk', sans-serif;
  }
  .eyebrow b{color:var(--amber); font-weight:700;}
  .reset-btn{
    background:none;border:none;color:var(--ink-muted);
    font-size:11px; font-family:'Zen Maru Gothic',sans-serif;
    cursor:pointer; text-decoration:underline; opacity:.7;
  }
  .reset-btn:hover{opacity:1;color:var(--danger);}

  .progress-track{
    width:100%; max-width:460px; height:6px; border-radius:4px;
    background:var(--desk-2); overflow:hidden; margin-bottom:22px;
    box-shadow: inset 0 0 0 1px var(--ring);
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--amber-dim),var(--amber));
    width:0%; transition:width .4s ease;
  }

  .score-comment{
    width:100%; max-width:460px; min-height:16px;
    font-family:'Space Grotesk', sans-serif;
    font-size:12.5px; letter-spacing:.01em;
    color:var(--amber);
    margin-top:8px; margin-bottom:14px;
    text-align:left;
    opacity:.95;
  }

  /* ---------- stage / lamp glow ---------- */
  .stage{
    position:relative;
    width:100%; max-width:440px;
    display:flex; justify-content:center;
    perspective:1400px;
    margin-bottom:18px;
  }
  .lamp-glow{
    position:absolute; top:-60px; left:50%; transform:translateX(-50%);
    width:340px; height:220px;
    background:radial-gradient(ellipse at center, rgba(242,165,65,.28), transparent 70%);
    filter:blur(6px);
    pointer-events:none;
    animation:breathe 5s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{opacity:.7; transform:translateX(-50%) scale(1);}
    50%{opacity:1; transform:translateX(-50%) scale(1.05);}
  }

  .card-wrap{
    position:relative;
    width:100%; max-width:400px; height:280px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .card{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.4,.2,.2,1);
  }
  .card.flipped{ transform:rotateY(180deg); }

  .face{
    position:absolute; inset:0;
    -webkit-backface-visibility:hidden; backface-visibility:hidden;
    border-radius:18px;
    background:linear-gradient(165deg,var(--desk-2),var(--desk));
    box-shadow:0 20px 45px -18px rgba(0,0,0,.7), 0 0 0 1px var(--ring);
    display:flex; flex-direction:column;
    padding:0;
    overflow:hidden;
  }
  .face.back{ transform:rotateY(180deg); }

  /* side tab, like the textbook's colored margin label */
  .tab{
    position:absolute; top:22px; left:0;
    writing-mode:vertical-rl;
    font-size:11px; letter-spacing:.05em;
    padding:10px 5px;
    border-radius:0 8px 8px 0;
    color:#1a1a1a;
    font-weight:700;
    box-shadow:2px 2px 6px rgba(0,0,0,.35);
  }

  /* ring holes to sell the "flash card ring" motif */
  .rings{ display:flex; justify-content:center; gap:26px; padding-top:14px; }
  .rings span{
    width:14px;height:14px;border-radius:50%;
    background:var(--void);
    box-shadow:inset 0 2px 3px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.03);
  }

  .card-id{
    position:absolute; top:14px; right:18px;
    font-family:'Space Grotesk',sans-serif; font-size:11px;
    color:var(--ink-muted);
  }

  .card-body{
    flex:1; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:20px 34px;
  }
  .jp-text{
    font-size:26px; font-weight:700; line-height:1.5; color:var(--paper);
  }
  .en-text{
    font-size:27px; font-weight:700; line-height:1.5; color:var(--paper);
    font-family:'Space Grotesk',sans-serif;
  }
  .en-text .key{ color:var(--amber); }

  .hint{
    text-align:center; font-size:11px; color:var(--ink-muted);
    padding-bottom:14px; letter-spacing:.04em;
  }

  .speak-btn{
    position:absolute; bottom:14px; right:16px;
    width:38px; height:38px; border-radius:50%;
    background:var(--desk); border:1px solid var(--ring);
    color:var(--amber); font-size:16px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .speak-btn:hover{ background:var(--void); }

  /* ---------- controls ---------- */
  .status-row{
    display:flex; gap:10px; width:100%; max-width:400px; margin-top:6px;
  }
  .status-btn{
    flex:1; padding:11px 0; border-radius:12px; border:1px solid var(--ring);
    background:var(--desk); color:var(--ink-muted);
    font-family:'Zen Maru Gothic',sans-serif; font-size:14px; font-weight:700;
    cursor:pointer; transition:all .15s ease;
  }
  .status-btn.review{ }
  .status-btn.review.active{ background:rgba(226,105,79,.15); border-color:var(--danger); color:var(--danger); }
  .status-btn.known.active{ background:rgba(99,201,189,.15); border-color:var(--teal); color:var(--teal); }
  .status-btn:hover{ opacity:.85; }

  .nav-row{
    display:flex; align-items:center; gap:10px; width:100%; max-width:400px; margin-top:12px;
  }
  .nav-btn{
    flex:1; padding:12px 0; border-radius:12px; border:none;
    background:var(--desk-2); color:var(--paper);
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px;
    cursor:pointer;
  }
  .nav-btn:hover{ background:var(--ring); }
  .nav-btn.shuffle{ flex:0 0 46px; font-size:16px; }

  /* group jump pills */
  .group-nav{
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center;
    width:100%; max-width:440px; margin-top:22px;
  }
  .pill{
    font-size:11px; padding:6px 10px; border-radius:20px;
    background:var(--desk); border:1px solid var(--ring); color:var(--ink-muted);
    cursor:pointer;
  }
  .pill.current{ border-color:var(--amber); color:var(--amber); }

  /* note card */
  .note-toggle{
    margin-top:16px; font-size:12px; color:var(--amber-dim);
    background:none; border:1px dashed var(--amber-dim); border-radius:10px;
    padding:8px 14px; cursor:pointer; max-width:400px; width:100%;
    display:flex; align-items:center; gap:6px; justify-content:center;
  }
  .note-box{
    max-width:400px; width:100%; margin-top:10px;
    background:var(--desk-2); border-left:3px solid var(--amber);
    border-radius:0 12px 12px 0; padding:14px 16px; font-size:13px;
    line-height:1.7; color:var(--paper); display:none;
  }
  .note-box.show{ display:block; }
  .note-box b{ color:var(--amber); }

  .foot{
    margin-top:30px; font-size:11px; color:var(--ink-muted); text-align:center;
    max-width:420px; line-height:1.8;
  }
  .foot code{ background:var(--desk-2); padding:1px 5px; border-radius:4px; }

  @media (max-width:420px){
    .jp-text{font-size:22px;} .en-text{font-size:22px;}
    .card-wrap{height:260px;}
  }
</style>
</head>

  <div class="nav-row">

  <div class="group-nav" id="groupNav"></div>

  <button class="note-toggle" id="noteToggle" style="display:none;">🐻 このグループの豆知識を見る</button>
  <div class="note-box" id="noteBox"></div>

  <div class="foot">
    音声は現在ブラウザの読み上げ機能（Web Speech API）を使用しています。録音した音声ファイルに差し替えたい場合は、コード内の各カードの <code>audio</code> の値にファイルパスやURLを指定してください（例: <code>audio:'sounds/0011.mp3'</code>）。指定があれば自動的にそちらが再生されます。<br>
    学習の記録（できた／わからない）は自動的に保存され、次回開いたときも引き継がれます。
  </div>

  {min:0,  max:9,  comment:"Just getting started! Flip through the whole deck once before worrying about the score."},
];
function commentFor(score){
  const band = SCORE_BANDS.find(b=>score>=b.min && score<=b.max);
  return band ? band.comment : '';
}

let order = CARDS.map((_,i)=>i);
let pos = 0;
let flipped = false;
let statuses = {}; // id -> 'known' | 'review'

const el = id=>document.getElementById(id);
const cardEl=el('card'), cardWrap=el('cardWrap');

async function loadProgress(){
  try{
    const res = await window.storage.get('flashcard-progress', false);
    if(res && res.value){
      const data = JSON.parse(res.value);
      statuses = data.statuses || {};
      if(typeof data.pos === 'number') pos = Math.min(data.pos, CARDS.length-1);
    }
  }catch(e){ /* no saved progress yet */ }
  renderGroupNav();
  renderCard();
}

async function saveProgress(){
  try{
    await window.storage.set('flashcard-progress', JSON.stringify({statuses, pos}), false);
  }catch(e){ console.warn('保存に失敗しました', e); }
}

function currentCard(){ return CARDS[order[pos]]; }

function renderCard(){
  const c = currentCard();
  flipped = false;
  cardEl.classList.remove('flipped');

  el('tabFront').textContent = c.tab;
  el('tabBack').textContent = c.tab;
  el('tabFront').style.background = GROUPS[c.g].color;
  el('tabBack').style.background = GROUPS[c.g].color;
  el('idFront').textContent = c.id;
  el('idBack').textContent = c.id;
  el('jpText').textContent = c.jp;

  const re = new RegExp('\\b('+c.key+')', 'i');
  el('enText').innerHTML = c.en.replace(re, '<span class="key">$1</span>');

  el('eyebrowIndex')?.remove();
  document.querySelector('.eyebrow').innerHTML =
    `${GROUPS[c.g].name} &nbsp;·&nbsp; <b>${pos+1}</b>/${CARDS.length}`;

  updateStatusButtons();
  updateProgress();
  renderGroupNav();
  renderNote(c);
}

function updateStatusButtons(){
  const c = currentCard();
  const s = statuses[c.id];
  el('reviewBtn').classList.toggle('active', s==='review');
  el('knownBtn').classList.toggle('active', s==='known');
}

function updateProgress(){
  const done = Object.values(statuses).filter(s=>s==='known').length;
  el('doneCount').textContent = done;
  el('progressFill').style.width = (done/CARDS.length*100)+'%';
  el('scoreComment').textContent = commentFor(done);
}

function renderGroupNav(){
  const nav = el('groupNav');
  nav.innerHTML = '';
  const c = currentCard();
  Object.entries(GROUPS).forEach(([key,g])=>{
    const firstIdx = CARDS.findIndex(x=>x.g===key);
    const pill = document.createElement('div');
    pill.className = 'pill' + (c.g===key ? ' current' : '');
    pill.textContent = g.name.replace(/①|②|③|④/g,'').slice(0,10);
    pill.onclick = ()=>{ pos = order.indexOf(firstIdx); renderCard(); saveProgress(); };
    nav.appendChild(pill);
  });
}

function renderNote(c){
  const toggle = el('noteToggle'), box = el('noteBox');
  if(c.note){
    toggle.style.display='flex';
    box.innerHTML = c.note;
    box.classList.remove('show');
    toggle.textContent = '🐻 このグループの豆知識を見る';
  } else {
    toggle.style.display='none';
    box.classList.remove('show');
  }
}

el('noteToggle').onclick = ()=>{
  const box = el('noteBox');
  box.classList.toggle('show');
};

cardWrap.addEventListener('click', ()=>{
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
});

el('speakBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  playAudio(currentCard());
});

function playAudio(c){
  if(c.audio){
    new Audio(c.audio).play().catch(()=>speak(c.speak || c.en));
  } else {
    speak(c.speak || c.en);
  }
}
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.92;
  window.speechSynthesis.speak(u);
}

function setStatus(status){
  const c = currentCard();
  statuses[c.id] = (statuses[c.id]===status) ? undefined : status;
  if(statuses[c.id]===undefined) delete statuses[c.id];
  updateStatusButtons();
  updateProgress();
  saveProgress();
}
el('knownBtn').onclick = ()=>setStatus('known');
el('reviewBtn').onclick = ()=>setStatus('review');

function go(delta){
  pos = (pos + delta + order.length) % order.length;
  renderCard();
  saveProgress();
}
el('nextBtn').onclick = ()=>go(1);
el('prevBtn').onclick = ()=>go(-1);

el('shuffleBtn').onclick = ()=>{
  const currentIdx = order[pos];
  order = CARDS.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  pos = order.indexOf(currentIdx);
  renderCard();
};

el('resetBtn').onclick = async ()=>{
  if(!confirm('学習の記録（できた／わからない）をすべて消去します。よろしいですか？')) return;
  statuses = {};
  await saveProgress();
  updateStatusButtons();
  updateProgress();
};

document.addEventListener('keydown', (e)=>{
  if(e.code==='Space'){ e.preventDefault(); cardWrap.click(); }
  if(e.code==='ArrowRight'){ go(1); }
  if(e.code==='ArrowLeft'){ go(-1); }
  if(e.key==='p' || e.key==='P'){ playAudio(currentCard()); }
});

loadProgress();
</script>
</body>
</html>
